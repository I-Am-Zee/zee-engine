# PagesCMS Configuration (https://pagescms.org)

# Media settings
media:
  input: public/images
  output: /images

content:
  # Collections
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, sku, price, category]
      primary: title
      sort: [title]
    fields:
      - name: title
        label: Product Name
        type: string
      - name: sku
        label: SKU
        type: string
      - name: price
        label: Base Price (INR)
        type: number
      - name: salePrice
        label: Sale Price (INR)
        type: number
      - name: image
        label: Main Image
        type: image
      - name: gallery
        label: Product Gallery
        type: list
        field:
          type: image
      - name: category
        label: Category
        type: select
        options:
          values:
            - rings
            - necklaces
            - earrings
            - bracelets
          creatable: true
      - name: description
        label: Short Summary
        type: text
      - name: body
        label: Detailed Description (Markdown)
        type: rich-text

      # Organization
      - name: tags
        label: Tags
        type: list
        field:
          type: string
      - name: badges
        label: Badges (e.g. New, Sale)
        type: list
        field:
          type: string
      - name: rating
        label: Customer Rating
        type: number
        min: 0
        max: 5

      # Snipcart & E-commerce Logic
      - name: product_options
        label: Product Options (Sizes, Materials)
        type: list
        fields:
          - name: name
            label: Option Name
            type: string
          - name: values
            label: Values
            type: list
            field:
              type: string
      - name: stock
        label: Inventory Count
        type: number
      - name: weight
        label: Shipping Weight (grams)
        type: number
      - name: dimensions
        label: Shipping Dimensions (cm)
        type: object
        fields:
          - name: length
            type: number
          - name: width
            type: number
          - name: height
            type: number
      - name: taxable
        label: Collect Tax?
        type: boolean
        default: true
      - name: publishDate
        label: Publish Date
        type: date

  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view:
      fields: [title, author, publishDate]
      primary: title
    fields:
      - name: title
        label: Post Title
        type: string
      - name: excerpt
        label: Summary Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
      - name: author
        label: Author Name
        type: string
        default: "Zaviona Team"
      - name: publishDate
        label: Date Published
        type: date
      - name: tags
        label: Categories / Tags
        type: list
        field:
          type: string
      - name: isDraft
        label: Keep as Draft?
        type: boolean
        default: false
      - name: body
        label: Content
        type: rich-text

  - name: pages
    label: Static Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, lastUpdated]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
      - name: description
        label: Meta Description
        type: text
      - name: lastUpdated
        label: Last Updated
        type: date
      - name: body
        label: Page Content
        type: rich-text

  - name: settings
    label: Global Settings
    type: file
    path: src/content/settings/site.yml
    format: yaml
    fields:
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Site Tagline
        type: string
      - name: description
        label: SEO Site Description
        type: text
      - name: url
        label: Production URL
        type: string
      - name: email
        label: Contact Emails
        type: object
        fields:
          - name: support
            type: string
          - name: orders
            type: string
      - name: social
        label: Social Media
        type: object
        fields:
          - name: instagram
            type: string
          - name: pinterest
            type: string
          - name: facebook
            type: string
          - name: twitter
            type: string
