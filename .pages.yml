# PagesCMS Configuration - Beast Mode
# Fixed & Optimized for Zaviona

media:
  input: public/images
  output: /images

content:
  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCTS COLLECTION
  # ═══════════════════════════════════════════════════════════════════════════
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, sku, price, category]
      primary: title
      sort: [title]
    fields:
      # ─── Core Product Info ─────────────────────────────────────────────────
      - name: title
        label: Product Name
        type: string
        required: true
        description: "Display name (e.g., 'Celestial Diamond Ring'). Used in cart, receipts, and SEO."
      - name: sku
        label: SKU (Stock Keeping Unit)
        type: string
        description: "Format: ABC-123. Optional but recommended."
      - name: price
        label: Regular Price (INR)
        type: number
        required: true
        description: "Base price. Must be greater than 0."
      - name: salePrice
        label: Sale Price (INR)
        type: number
        description: "Discounted price (optional). Must be less than regular price."

      # ─── Images ────────────────────────────────────────────────────────────
      - name: image
        label: Featured Image
        type: image
        required: true
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
      - name: gallery
        label: Product Gallery
        type: image
        list: true # Enables multi-image picker
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Classification ────────────────────────────────────────────────────
      - name: category
        label: Primary Category
        type: select
        required: true
        options:
          creatable: false
          values: # FIXED: Moved inside options
            - rings
            - necklaces
            - earrings
            - bracelets
            - gifts
            - sets
      - name: tags
        label: Product Tags
        type: select
        options:
          multiple: true
          creatable: true # Changed to true for flexibility
          values: # FIXED: Moved inside options
            - diamond
            - gold
            - silver
            - platinum
            - engagement
            - wedding
            - luxury
            - gift
            - everyday
            - formal
            - waterproof
            - pvd-coated
      - name: badges
        label: Badges
        type: select
        options:
          multiple: true
          creatable: false
          values: # FIXED: Moved inside options
            - sale
            - last-chance
            - flash-deal
            - new
            - bestseller
            - limited-edition
            - restocked
            - exclusive
            - waterproof
            - gift-set
            - pre-order
            - sold-out

      # ─── Product Details ───────────────────────────────────────────────────
      - name: rating
        label: Customer Rating (0-5)
        type: number
      - name: description
        label: Short Summary
        type: text
        required: true
        description: "Max 200 characters. Used for meta description."
      - name: body
        label: Detailed Description
        type: rich-text
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Flexible Variants (Snipcart) ──────────────────────────────────────
      # FIXED: Removed duplicate 'type' keys and fixed list syntax
      - name: variant_1
        label: "Option 1 (e.g., Size, Color)"
        type: object
        fields:
          - name: name
            label: Option Name
            type: string
            description: "e.g. Size"
          - name: values
            label: Choices (comma-separated)
            type: string
            description: "e.g. S, M, L, XL"
          - name: price_modifiers
            label: Price Add-ons (match order)
            type: string
            description: "e.g. 0, 0, +200, +500"
      - name: variant_2
        label: "Option 2 (Optional)"
        type: object
        fields:
          - name: name
            label: Option Name
            type: string
          - name: values
            label: Choices (comma-separated)
            type: string
          - name: price_modifiers
            label: Price Add-ons
            type: string

      # ─── Urgency & Scarcity ────────────────────────────────────────────────
      - name: release_date
        label: Drop Date
        type: date
      - name: urgency_tag
        label: Scarcity Label
        type: select
        options:
          values: # FIXED: Moved inside options
            - Only 2 Left!
            - Restocked Today
            - Selling Fast
            - Last Chance

      # ─── Upsells (BEAST MODE UPGRADE) ──────────────────────────────────────
      - name: related_products
        label: "Complete the Look (Upsells)"
        type: reference
        options:
          collection: products
          multiple: true
          search: title

      # ─── Shipping Info ─────────────────────────────────────────────────────
      - name: weight
        label: Weight (grams)
        type: number
      - name: dimensions
        label: Dimensions (cm)
        type: object
        fields:
          - name: length
            label: Length
            type: number
          - name: width
            label: Width
            type: number
          - name: height
            label: Height
            type: number

      # ─── Publishing ────────────────────────────────────────────────────────
      - name: publishDate
        label: Publish Date
        type: date

  # ═══════════════════════════════════════════════════════════════════════════
  # LOOKBOOK - Shop the Look
  # ═══════════════════════════════════════════════════════════════════════════
  - name: lookbooks
    label: Shop the Look
    type: collection
    path: src/content/lookbooks
    format: yaml-frontmatter
    view:
      fields: [title]
      primary: title
    fields:
      - name: title
        label: Look Name
        type: string
        required: true
      - name: hero_image
        label: Lifestyle Shot
        type: image
        required: true
        options:
          path: lookbooks
      - name: description
        label: Description
        type: text
      - name: products
        label: Products in this Look
        type: reference
        options:
          collection: products
          multiple: true
          search: title
      - name: body
        label: Story Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOG POSTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view:
      fields: [title, author, publishDate]
      primary: title
    fields:
      - name: title
        label: Post Title
        type: string
        required: true
      - name: excerpt
        label: Summary Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
        options:
          path: blog
      - name: author
        label: Author Name
        type: string
        default: "Zaviona Team"
      - name: publishDate
        label: Date Published
        type: date
      - name: tags
        label: Categories / Tags
        type: select
        options:
          multiple: true
          creatable: true
          values: # FIXED: Moved inside options
            - Branding
            - Luxury
            - Jewelry Care
            - Style Guide
            - Announcements
            - Trends
      - name: isDraft
        label: Keep as Draft?
        type: boolean
        default: false
      - name: body
        label: Content
        type: rich-text
        options:
          path: blog

  # ═══════════════════════════════════════════════════════════════════════════
  # STATIC PAGES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: pages
    label: Static Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, lastUpdated]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
        required: true
      - name: description
        label: Meta Description
        type: text
      - name: lastUpdated
        label: Last Updated
        type: date
      - name: body
        label: Page Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # GLOBAL SETTINGS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: settings
    label: Global Settings
    type: file
    path: src/content/settings/site.yml
    format: yaml
    fields:
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Site Tagline
        type: string
      - name: description
        label: SEO Site Description
        type: text
      - name: url
        label: Production URL
        type: string
      - name: email
        label: Contact Emails
        type: object
        fields:
          - name: support
            label: Support Email
            type: string
          - name: orders
            label: Orders Email
            type: string
      - name: social
        label: Social Media
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: pinterest
            label: Pinterest URL
            type: string
          - name: facebook
            label: Facebook URL
            type: string
          - name: twitter
            label: Twitter/X URL
            type: string
      - name: announcement_bar
        label: Top Announcement Bar
        type: object
        fields:
          - name: enabled
            label: Show Announcement?
            type: boolean
            default: false
          - name: text
            label: Message
            type: string
          - name: link
            label: Link URL (Optional)
            type: string
          - name: bg_color
            label: Background Color
            type: string
            default: "bg-black"
          - name: text_color
            label: Text Color
            type: string
            default: "text-white"
      - name: popup_modal
        label: Welcome/Exit Popup
        type: object
        fields:
          - name: active
            label: Enable Popup?
            type: boolean
            default: false
          - name: title
            label: Heading
            type: string
          - name: description
            label: Body Text
            type: text
          - name: coupon_code
            label: Snipcart Coupon Code
            type: string
          - name: image
            label: Popup Image
            type: image
          - name: cta_text
            label: Button Text
            type: string
            default: "Claim Discount"
      - name: free_shipping_threshold
        label: Free Shipping Threshold (₹)
        type: number
        default: 3000
        description: "Minimum cart value to qualify for free shipping. Shown in cart nudge."
