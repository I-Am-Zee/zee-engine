# PagesCMS Configuration - Beast Mode
# Zaviona Costume Jewelry E-commerce

media:
  input: public/images
  output: /images

content:
  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCTS COLLECTION
  # ═══════════════════════════════════════════════════════════════════════════
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, sku, price, category]
      primary: title
      sort: [title]
    fields:
      # ─── Core Product Info ─────────────────────────────────────────────────
      - name: title
        label: Product Name
        type: string
        required: true
        description: "Display name (e.g., 'Celestial Diamond Ring'). Used in cart, receipts, and SEO. Max 100 characters."
      - name: sku
        label: SKU (Stock Keeping Unit)
        type: string
        description: "Format: ABC-123 (e.g., 'CDR-010'). Optional but recommended for inventory tracking."
      - name: price
        label: Regular Price (INR)
        type: number
        required: true
        description: "Base price in Indian Rupees. Snipcart reads this at page load via data-item-price. Must be greater than 0."
      - name: salePrice
        label: Sale Price (INR)
        type: number
        description: "Discounted price (optional). MUST be less than regular price. Validated by Zod schema at build time."

      # ─── Images ────────────────────────────────────────────────────────────
      - name: image
        label: Featured Image
        type: image
        required: true
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
        description: "Main product image. Min 1200x1200px recommended. Used in cart, product cards, and social sharing."
      - name: gallery
        label: Product Gallery
        type: image
        options:
          multiple: true
          path: products
          extensions: [jpg, jpeg, png, webp]
        description: "Additional product photos (3-5 recommended, max 10 for performance). Swipeable on product detail page."

      # ─── Classification ────────────────────────────────────────────────────
      - name: category
        label: Primary Category
        type: select
        required: true
        values:
          - rings
          - necklaces
          - earrings
          - bracelets
          - gifts
          - sets
        options:
          creatable: false
        description: "Main category for navigation. Only one allowed (single-select)."
      - name: tags
        label: Product Tags
        type: select
        values:
          - diamond
          - gold
          - silver
          - platinum
          - engagement
          - wedding
          - luxury
          - gift
          - white-gold
          - rose-gold
          - everyday
          - formal
          - waterproof
          - pvd-coated
        options:
          multiple: true
          creatable: false
        description: "Filtering tags (multi-select). Used for faceted search, product discovery, and SEO keywords."
       - name: badges
        label: Badges
        type: select
        values:
          # Tier 1: Urgency (Coral)
          - sale
          - last-chance
          - flash-deal
          # Tier 2: Prestige (Brass)
          - new
          - new-drop
          - bestseller
          - limited-edition
          - restocked
          - staff-pick
          - exclusive
          - luxury
          # Tier 3: Attributes (Surface)
          - essential
          - classic
          - waterproof
          - pvd-gold
          - gift-set
          - gift-idea
          - pre-order
          - engravable
          # Tier 4: State (Outline)
          - coming-soon
          - sold-out
        options:
          multiple: true
          creatable: false
        description: "Marketing badges for product cards. Auto-sorted by hierarchy (Urgency > Prestige > Attributes > State) in frontend."

      # ─── Product Details ───────────────────────────────────────────────────
      - name: rating
        label: Customer Rating (0-5)
        type: number
        description: "Average review score for display (0.0-5.0). Not managed by Snipcart (display-only metadata)."
      - name: description
        label: Short Summary
        type: text
        required: true
        description: "Concise product description for cards, cart, and meta. Max 200 characters, 2 sentences recommended."
      - name: body
        label: Detailed Description
        type: rich-text
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
        description: "Full product story with images. Supports markdown formatting and inline media embeds."

      # ─── Flexible Variants (Snipcart) ──────────────────────────────────────
      # Note: Due to PagesCMS limitations with nested list objects,
      # we use a simplified structure with predefined option slots.
      - name: variant_1
        label: "Option 1 (e.g., Size, Color)"
        type: object
        fields:
          - name: name
            label: Option Name
            type: string
          - name: values
            label: Choices (comma-separated)
            type: string
            description: "e.g., S, M, L, XL or Gold, Silver, Rose Gold"
          - name: price_modifiers
            label: Price Add-ons (match order)
            type: string
            description: "e.g., 0, 0, +200, +500"
      - name: variant_2
        label: "Option 2 (Optional)"
        type: object
        fields:
          - name: name
            label: Option Name
            type: string
          - name: values
            label: Choices (comma-separated)
            type: string
          - name: price_modifiers
            label: Price Add-ons
            type: string
      - name: variant_3
        label: "Option 3 (Optional - e.g., Gift Wrap)"
        type: object
        fields:
          - name: name
            label: Option Name
            type: string
          - name: values
            label: Choices
            type: string
          - name: is_checkbox
            label: Is this a checkbox option?
            type: boolean
            default: false

      # ─── Urgency & Scarcity ────────────────────────────────────────────────
      - name: release_date
        label: Drop Date
        type: date
        description: "If future, product shows 'Coming Soon' with countdown"
      - name: urgency_tag
        label: Scarcity Label
        type: select
        options:
          values:
            - Only 2 Left!
            - Restocked Today
            - Selling Fast
            - Last Chance
            - Almost Gone

      # ─── Upsells & Cross-sells ─────────────────────────────────────────────
      - name: related_products
        label: "Complete the Look (Upsells)"
        type: select
        options:
          multiple: true
          creatable: false
          values:
            - celestial-diamond-ring
            - diamond-stud-earrings
            - diamond-tennis-bracelet
            - diamond-tennis-necklace
            - emerald-drop-earrings
            - ethereal-gold-necklace
            - gold-chain-bracelet
            - luxury-gift-set
            - moonstone-pearl-earrings
            - pearl-strand-necklace
            - sapphire-eternity-band
            - vintage-rose-gold-ring

      # ─── Shipping Info ─────────────────────────────────────────────────────
      - name: weight
        label: Weight (grams)
        type: number
      - name: dimensions
        label: Dimensions (cm)
        type: object
        fields:
          - name: length
            label: Length
            type: number
          - name: width
            label: Width
            type: number
          - name: height
            label: Height
            type: number

      # ─── Publishing ────────────────────────────────────────────────────────
      - name: publishDate
        label: Publish Date
        type: date

  # ═══════════════════════════════════════════════════════════════════════════
  # LOOKBOOK - Shop the Look
  # ═══════════════════════════════════════════════════════════════════════════
  - name: lookbooks
    label: Shop the Look
    type: collection
    path: src/content/lookbooks
    format: yaml-frontmatter
    view:
      fields: [title]
      primary: title
    fields:
      - name: title
        label: Look Name (e.g., "Diwali Party Glam")
        type: string
      - name: hero_image
        label: Lifestyle Shot
        type: image
        options:
          path: lookbooks
          extensions: [jpg, jpeg, png, webp]
      - name: description
        label: Description
        type: text
      - name: products
        label: Products in this Look
        type: select
        options:
          multiple: true
          values:
            - celestial-diamond-ring
            - diamond-stud-earrings
            - diamond-tennis-bracelet
            - diamond-tennis-necklace
            - emerald-drop-earrings
            - ethereal-gold-necklace
            - gold-chain-bracelet
            - luxury-gift-set
            - moonstone-pearl-earrings
            - pearl-strand-necklace
            - sapphire-eternity-band
            - vintage-rose-gold-ring
      - name: body
        label: Story Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOG POSTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view:
      fields: [title, author, publishDate]
      primary: title
    fields:
      - name: title
        label: Post Title
        type: string
      - name: excerpt
        label: Summary Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp]
      - name: author
        label: Author Name
        type: string
        default: "Zaviona Team"
      - name: publishDate
        label: Date Published
        type: date
      - name: tags
        label: Categories / Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - Branding
            - Luxury
            - Jewelry Care
            - Style Guide
            - Announcements
            - Trends
      - name: isDraft
        label: Keep as Draft?
        type: boolean
        default: false
      - name: body
        label: Content
        type: rich-text
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp, gif]

  # ═══════════════════════════════════════════════════════════════════════════
  # STATIC PAGES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: pages
    label: Static Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, lastUpdated]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
      - name: description
        label: Meta Description
        type: text
      - name: lastUpdated
        label: Last Updated
        type: date
      - name: body
        label: Page Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # GLOBAL SETTINGS - Marketing Command Center
  # ═══════════════════════════════════════════════════════════════════════════
  - name: settings
    label: Global Settings
    type: file
    path: src/content/settings/site.yml
    format: yaml
    fields:
      # ─── Brand Identity ────────────────────────────────────────────────────
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Site Tagline
        type: string
      - name: description
        label: SEO Site Description
        type: text
      - name: url
        label: Production URL
        type: string

      # ─── Contact ───────────────────────────────────────────────────────────
      - name: email
        label: Contact Emails
        type: object
        fields:
          - name: support
            label: Support Email
            type: string
          - name: orders
            label: Orders Email
            type: string
      - name: social
        label: Social Media
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: pinterest
            label: Pinterest URL
            type: string
          - name: facebook
            label: Facebook URL
            type: string
          - name: twitter
            label: Twitter/X URL
            type: string

      # ─── Announcement Bar ──────────────────────────────────────────────────
      - name: announcement_bar
        label: Top Announcement Bar
        type: object
        fields:
          - name: enabled
            label: Show Announcement?
            type: boolean
            default: false
          - name: text
            label: Message
            type: string
          - name: link
            label: Link URL (Optional)
            type: string
          - name: bg_color
            label: Background Color (Tailwind class)
            type: string
            default: "bg-black"
          - name: text_color
            label: Text Color (Tailwind class)
            type: string
            default: "text-white"

      # ─── Popup Modal ───────────────────────────────────────────────────────
      - name: popup_modal
        label: Welcome/Exit Popup
        type: object
        fields:
          - name: active
            label: Enable Popup?
            type: boolean
            default: false
          - name: title
            label: Heading (e.g., "Get 10% Off")
            type: string
          - name: description
            label: Body Text
            type: text
          - name: coupon_code
            label: Snipcart Coupon Code
            type: string
          - name: image
            label: Popup Image
            type: image
          - name: cta_text
            label: Button Text
            type: string
            default: "Claim Discount"
