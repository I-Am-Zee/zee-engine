# PagesCMS Configuration - Beast Mode
# Zaviona Costume Jewelry E-commerce

media:
  input: public/images
  output: /images

content:
  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCTS COLLECTION
  # ═══════════════════════════════════════════════════════════════════════════
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, sku, price, category]
      primary: title
      sort: [title]
    fields:
      # ─── Core Product Info ─────────────────────────────────────────────────
      - name: title
        label: Product Name
        type: string
      - name: sku
        label: SKU
        type: string
      - name: price
        label: Base Price (INR)
        type: number
      - name: salePrice
        label: Sale Price (INR)
        type: number

      # ─── Images ────────────────────────────────────────────────────────────
      - name: image
        label: Main Image
        type: image
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
      - name: gallery
        label: Product Gallery
        type: image
        options:
          multiple:
            max: 10
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Classification ────────────────────────────────────────────────────
      - name: category
        label: Category
        type: select
        options:
          values:
            - rings
            - necklaces
            - earrings
            - bracelets
            - gifts
            - sets
          creatable: true
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - diamond
            - gold
            - silver
            - platinum
            - engagement
            - wedding
            - luxury
            - gift
            - white-gold
            - rose-gold
            - everyday
            - formal
            - waterproof
            - pvd-coated
      - name: badges
        label: Badges
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - New
            - Sale
            - Bestseller
            - Limited Edition
            - Exclusive
            - Coming Soon

      # ─── Product Details ───────────────────────────────────────────────────
      - name: rating
        label: Customer Rating (0-5)
        type: number
        min: 0
        max: 5
      - name: description
        label: Short Summary
        type: text
      - name: body
        label: Detailed Description
        type: rich-text
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Flexible Variants (Snipcart) ──────────────────────────────────────
      - name: variants
        label: Product Options (Snipcart)
        type: list
        fields:
          - name: name
            label: Option Name (e.g., "Size", "Plating", "Gift Wrap")
            type: string
          - name: type
            label: Input Type
            type: select
            options:
              values:
                - dropdown
                - checkbox
          - name: values
            label: Choices
            type: list
            field:
              type: string
          - name: price_modifiers
            label: Price Add-ons (match order, e.g., "0|0|+500")
            type: string

      # ─── Urgency & Scarcity ────────────────────────────────────────────────
      - name: release_date
        label: Drop Date
        type: date
        description: "If future, product shows 'Coming Soon' with countdown"
      - name: urgency_tag
        label: Scarcity Label
        type: select
        options:
          values:
            - Only 2 Left!
            - Restocked Today
            - Selling Fast
            - Last Chance
            - Almost Gone

      # ─── Upsells & Cross-sells ─────────────────────────────────────────────
      - name: related_products
        label: "Complete the Look (Upsells)"
        type: select
        options:
          multiple: true
          creatable: false
          values:
            - celestial-diamond-ring
            - diamond-stud-earrings
            - diamond-tennis-bracelet
            - diamond-tennis-necklace
            - emerald-drop-earrings
            - ethereal-gold-necklace
            - gold-chain-bracelet
            - luxury-gift-set
            - moonstone-pearl-earrings
            - pearl-strand-necklace
            - sapphire-eternity-band
            - vintage-rose-gold-ring

      # ─── Shipping Info ─────────────────────────────────────────────────────
      - name: weight
        label: Weight (grams)
        type: number
      - name: dimensions
        label: Dimensions (cm)
        type: object
        fields:
          - name: length
            label: Length
            type: number
          - name: width
            label: Width
            type: number
          - name: height
            label: Height
            type: number

      # ─── Publishing ────────────────────────────────────────────────────────
      - name: publishDate
        label: Publish Date
        type: date

  # ═══════════════════════════════════════════════════════════════════════════
  # LOOKBOOK - Shop the Look
  # ═══════════════════════════════════════════════════════════════════════════
  - name: lookbooks
    label: Shop the Look
    type: collection
    path: src/content/lookbooks
    format: yaml-frontmatter
    view:
      fields: [title]
      primary: title
    fields:
      - name: title
        label: Look Name (e.g., "Diwali Party Glam")
        type: string
      - name: hero_image
        label: Lifestyle Shot
        type: image
        options:
          path: lookbooks
          extensions: [jpg, jpeg, png, webp]
      - name: description
        label: Description
        type: text
      - name: products
        label: Products in this Look
        type: select
        options:
          multiple: true
          values:
            - celestial-diamond-ring
            - diamond-stud-earrings
            - diamond-tennis-bracelet
            - diamond-tennis-necklace
            - emerald-drop-earrings
            - ethereal-gold-necklace
            - gold-chain-bracelet
            - luxury-gift-set
            - moonstone-pearl-earrings
            - pearl-strand-necklace
            - sapphire-eternity-band
            - vintage-rose-gold-ring
      - name: body
        label: Story Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOG POSTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view:
      fields: [title, author, publishDate]
      primary: title
    fields:
      - name: title
        label: Post Title
        type: string
      - name: excerpt
        label: Summary Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp]
      - name: author
        label: Author Name
        type: string
        default: "Zaviona Team"
      - name: publishDate
        label: Date Published
        type: date
      - name: tags
        label: Categories / Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - Branding
            - Luxury
            - Jewelry Care
            - Style Guide
            - Announcements
            - Trends
      - name: isDraft
        label: Keep as Draft?
        type: boolean
        default: false
      - name: body
        label: Content
        type: rich-text
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp, gif]

  # ═══════════════════════════════════════════════════════════════════════════
  # STATIC PAGES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: pages
    label: Static Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, lastUpdated]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
      - name: description
        label: Meta Description
        type: text
      - name: lastUpdated
        label: Last Updated
        type: date
      - name: body
        label: Page Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # GLOBAL SETTINGS - Marketing Command Center
  # ═══════════════════════════════════════════════════════════════════════════
  - name: settings
    label: Global Settings
    type: file
    path: src/content/settings/site.yml
    format: yaml
    fields:
      # ─── Brand Identity ────────────────────────────────────────────────────
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Site Tagline
        type: string
      - name: description
        label: SEO Site Description
        type: text
      - name: url
        label: Production URL
        type: string

      # ─── Contact ───────────────────────────────────────────────────────────
      - name: email
        label: Contact Emails
        type: object
        fields:
          - name: support
            label: Support Email
            type: string
          - name: orders
            label: Orders Email
            type: string
      - name: social
        label: Social Media
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: pinterest
            label: Pinterest URL
            type: string
          - name: facebook
            label: Facebook URL
            type: string
          - name: twitter
            label: Twitter/X URL
            type: string

      # ─── Announcement Bar ──────────────────────────────────────────────────
      - name: announcement_bar
        label: Top Announcement Bar
        type: object
        fields:
          - name: enabled
            label: Show Announcement?
            type: boolean
            default: false
          - name: text
            label: Message
            type: string
          - name: link
            label: Link URL (Optional)
            type: string
          - name: bg_color
            label: Background Color (Tailwind class)
            type: string
            default: "bg-black"
          - name: text_color
            label: Text Color (Tailwind class)
            type: string
            default: "text-white"

      # ─── Popup Modal ───────────────────────────────────────────────────────
      - name: popup_modal
        label: Welcome/Exit Popup
        type: object
        fields:
          - name: active
            label: Enable Popup?
            type: boolean
            default: false
          - name: title
            label: Heading (e.g., "Get 10% Off")
            type: string
          - name: description
            label: Body Text
            type: text
          - name: coupon_code
            label: Snipcart Coupon Code
            type: string
          - name: image
            label: Popup Image
            type: image
          - name: cta_text
            label: Button Text
            type: string
            default: "Claim Discount"
