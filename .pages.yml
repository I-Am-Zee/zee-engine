# PagesCMS Configuration (https://pagescms.org)
# Refined for Zaviona Luxury E-commerce

# Media settings
media:
  input: public/images
  output: /images

content:
  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCTS COLLECTION
  # ═══════════════════════════════════════════════════════════════════════════
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: yaml-frontmatter
    view:
      fields: [title, sku, price, category]
      primary: title
      sort: [title]
    fields:
      # ─── Core Product Info ─────────────────────────────────────────────────
      - name: title
        label: Product Name
        type: string
      - name: sku
        label: SKU
        type: string
      - name: price
        label: Base Price (INR)
        type: number
      - name: salePrice
        label: Sale Price (INR)
        type: number

      # ─── Images ────────────────────────────────────────────────────────────
      - name: image
        label: Main Image
        type: image
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]
      - name: gallery
        label: Product Gallery
        type: image
        options:
          multiple:
            max: 10
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Classification ────────────────────────────────────────────────────
      - name: category
        label: Category
        type: select
        options:
          values:
            - rings
            - necklaces
            - earrings
            - bracelets
            - gifts
          creatable: true
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - diamond
            - gold
            - silver
            - platinum
            - engagement
            - wedding
            - luxury
            - gift
            - white-gold
            - rose-gold
      - name: badges
        label: Badges
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - New
            - Sale
            - Bestseller
            - Limited Edition
            - Exclusive

      # ─── Product Details ───────────────────────────────────────────────────
      - name: rating
        label: Customer Rating (0-5)
        type: number
        min: 0
        max: 5
      - name: description
        label: Short Summary
        type: text
      - name: body
        label: Detailed Description
        type: rich-text
        options:
          path: products
          extensions: [jpg, jpeg, png, webp]

      # ─── Variant Options ───────────────────────────────────────────────────
      - name: product_options
        label: Variant Options
        type: object
        fields:
          - name: sizes
            label: Available Sizes
            type: select
            options:
              multiple: true
              creatable: true
              values: ["5", "6", "7", "8", "9", "10"]
          - name: materials
            label: Available Materials
            type: select
            options:
              multiple: true
              creatable: true
              values:
                - White Gold
                - Yellow Gold
                - Rose Gold
                - Platinum
                - Silver

      # ─── Shipping Info (Optional) ──────────────────────────────────────────
      - name: weight
        label: Weight (grams)
        type: number
      - name: dimensions
        label: Dimensions (cm)
        type: object
        fields:
          - name: length
            label: Length
            type: number
          - name: width
            label: Width
            type: number
          - name: height
            label: Height
            type: number

      # ─── Publishing ────────────────────────────────────────────────────────
      - name: publishDate
        label: Publish Date
        type: date

  # ═══════════════════════════════════════════════════════════════════════════
  # BLOG POSTS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    view:
      fields: [title, author, publishDate]
      primary: title
    fields:
      - name: title
        label: Post Title
        type: string
      - name: excerpt
        label: Summary Excerpt
        type: text
      - name: image
        label: Cover Image
        type: image
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp]
      - name: author
        label: Author Name
        type: string
        default: "Zaviona Team"
      - name: publishDate
        label: Date Published
        type: date
      - name: tags
        label: Categories / Tags
        type: select
        options:
          multiple: true
          creatable: true
          values:
            - Branding
            - Luxury
            - Jewelry Care
            - Style Guide
            - Announcements
      - name: isDraft
        label: Keep as Draft?
        type: boolean
        default: false
      - name: body
        label: Content
        type: rich-text
        options:
          path: blog
          extensions: [jpg, jpeg, png, webp, gif]

  # ═══════════════════════════════════════════════════════════════════════════
  # STATIC PAGES
  # ═══════════════════════════════════════════════════════════════════════════
  - name: pages
    label: Static Pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    view:
      fields: [title, lastUpdated]
      primary: title
    fields:
      - name: title
        label: Page Title
        type: string
      - name: description
        label: Meta Description
        type: text
      - name: lastUpdated
        label: Last Updated
        type: date
      - name: body
        label: Page Content
        type: rich-text

  # ═══════════════════════════════════════════════════════════════════════════
  # GLOBAL SETTINGS
  # ═══════════════════════════════════════════════════════════════════════════
  - name: settings
    label: Global Settings
    type: file
    path: src/content/settings/site.yml
    format: yaml
    fields:
      - name: name
        label: Site Name
        type: string
      - name: tagline
        label: Site Tagline
        type: string
      - name: description
        label: SEO Site Description
        type: text
      - name: url
        label: Production URL
        type: string
      - name: email
        label: Contact Emails
        type: object
        fields:
          - name: support
            label: Support Email
            type: string
          - name: orders
            label: Orders Email
            type: string
      - name: social
        label: Social Media
        type: object
        fields:
          - name: instagram
            label: Instagram URL
            type: string
          - name: pinterest
            label: Pinterest URL
            type: string
          - name: facebook
            label: Facebook URL
            type: string
          - name: twitter
            label: Twitter/X URL
            type: string
