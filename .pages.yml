# PagesCMS Configuration (https://pagescms.org)

# Media settings: where images are stored and how they are referenced
media:
  input: public/images
  output: /images

content:
  - name: products
    label: Products
    type: collection
    path: src/content/products
    format: md
    fields:
      - name: title
        label: Title
        type: string
      - name: sku
        label: SKU
        type: string
      - name: price
        label: Price
        type: number
      - name: salePrice
        label: Sale Price
        type: number
      - name: image
        label: Main Image
        type: image
      - name: gallery
        label: Gallery
        type: list
        field:
          type: image
      - name: category
        label: Category
        type: select
        options:
          - label: Rings
            value: rings
          - label: Necklaces
            value: necklaces
          - label: Earrings
            value: earrings
          - label: Bracelets
            value: bracelets
      - name: rating
        label: Rating
        type: number
        min: 0
        max: 5
      - name: description
        label: Description
        type: text
      - name: tags
        label: Tags
        type: list
        field:
          type: string
      - name: badges
        label: Badges
        type: list
        field:
          type: string
      - name: product_options
        label: Product Options
        type: list
        fields:
          - name: name
            label: Option Name (e.g. Size)
            type: string
          - name: values
            label: Values
            type: list
            field:
              type: string
      - name: publishDate
        label: Publish Date
        type: date
      - name: stock
        label: Stock
        type: number
      - name: weight
        label: Weight (grams)
        type: number
      - name: taxable
        label: Taxable
        type: boolean
        default: true
      - name: body
        label: Body Content
        type: rich-text
