heading: "Frequently Asked Questions"
subtitle: "Everything you need to know about our pieces and processes."
categories:
  - title: "Products & Quality"
    icon: "PhSparkle"
    questions:
      - question: "Is your jewelry water-resistant?"
        answer: "Yes. Our Signature Line is PVD-coated, making it tarnish-free and water-resistant. However, we recommend avoiding harsh chemicals or chlorinated pools to maintain the maximum longevity of the finish."
      - question: "What materials do you use?"
        answer: "We primarily use high-grade 316L stainless steel as a base for our Signature Line and premium brass or alloy for our Trends-Watch collection. All pieces are lead and nickel-free."
  - title: "Shipping & Orders"
    icon: "PhTruck"
    questions:
      - question: "How long does delivery take?"
        answer: "Most orders are shipped within 24–48 hours. Depending on your location, standard delivery takes 3–5 business days across India."
      - question: "Do you ship internationally?"
        answer: "Currently, we only ship within India. We are working on expanding our reach soon!"
  - title: "Returns & Refunds"
    icon: "PhArrowsCounterClockwise"
    questions:
      - question: "What is your returns policy?"
        answer: "We offer a 48-hour return window for damaged or defective items only. A mandatory uncut unboxing video is required for all claims."
