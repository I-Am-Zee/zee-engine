announcement_bar:
  enabled: true
  text: >-
    ✨ Free Shipping on orders above ₹{{threshold}} | Use Code: FIRST10 for 10%
    Off
  link: /shop
discount_popup:
  enabled: false
  trigger: timed
  title: Unlock 10% Off
  description: >-
    Join our exclusive list and receive a welcome discount plus early access to
    new arrivals and sales.
  coupon_code: FIRST10
  cta_text: Claim My Discount
  denylist:
    - /checkout
newsletter_popup:
  enabled: false
  trigger: exit
  title: Join the Inner Circle
  description: >-
    Get early access to luxury drops and exclusive styling tips before anyone
    else.
  denylist: []
delivery_email_template: >-
  <p>Your piece has made it home — and we genuinely hope it brings a quiet kind of joy when you first wear it. That moment when something just <em>fits</em>, not just physically but in the way it feels like it was always yours? That's what {{brandName}} is here for.</p>


  <p>We'd love to hear about your experience — the order, the packaging, the piece itself. Not a generic star rating. Your real thoughts. If something felt off, we want to know. If something surprised you in a good way, we'd love to hear that too. It's how we get better at what we do — <a href="{{feedbackUrl}}" style="color: #052b22; text-decoration: underline;">share your thoughts here</a>. It only takes a minute, and it means more than you know.</p>


  <p>If you'd like to be among the first to know about new arrivals, seasonal pieces, and the occasional exclusive codes we share with people who've been here since the beginning — <a href="{{newsletterUrl}}" style="color: #052b22; text-decoration: underline;">stay in the loop</a>. There's always something worth discovering.</p>
